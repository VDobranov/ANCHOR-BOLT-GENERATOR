# Behave configuration for IFC Validation
# https://behave.readthedocs.io/

[behave]
# Пути к feature файлам
paths = tests/features
       external/ifc-gherkin-rules/features/rules

# Формат вывода
format = pretty
show_snippets = false
stdout_capture = no
stderr_capture = no

# Теги для запуска
tags = -@skip
       -@disabled
       -@IFC2X3
       -@IFC4X3

# Stop on first failure (отключено для полного отчёта)
stop = false

# Логирование
logging_level = INFO

[behave.formatters]
# JSON formatter для отчётности
json = behave_json_formatter:JSONFormatter
