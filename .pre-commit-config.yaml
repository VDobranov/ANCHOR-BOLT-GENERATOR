# .pre-commit-config.yaml
# Автоматическое форматирование и линтинг кода

repos:
  # Black - форматирование Python кода
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3.13
        args: [--line-length=100]

  # isort - сортировка импортов
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length=100"]

  # flake8 - линтер
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--ignore=E501,W503,F401,F841,E402,E731,F541,W293,F811"]
        exclude: ^tests/

  # mypy - статическая проверка типов (базовая проверка без strict режима)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports", "--no-strict-optional", "--disable-error-code=var-annotated", "--disable-error-code=call-arg", "--disable-error-code=attr-defined"]
        exclude: ^tests/
